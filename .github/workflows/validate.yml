name: validate

on:
  push:
  pull_request:

jobs:
  project-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate project structure
        run: python scripts/validate_project.py
