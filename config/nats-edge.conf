# Example NATS JetStream edge configuration for local SIGMABUS testing.
# Replace CHANGE_ME values before running outside an isolated lab.

server_name: sigmabus-edge
listen: 0.0.0.0:4222

jetstream {
  store_dir: "./var/jetstream"
  max_mem: 256M
  max_file: 1G
}

authorization {
  users = [
    {
      user: "sigmabus"
      password: "CHANGE_ME"
      permissions: {
        publish: ["cm.>", "sigmabus.>"]
        subscribe: ["cm.>", "sigmabus.>"]
      }
    }
  ]
}
